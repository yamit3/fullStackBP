<div class="page-layout">
  <header class="top-header">
    <h1 class="brand">BANCO</h1>
  </header>

  <div class="workspace">
    <nav class="side-menu" aria-label="Navegacion principal">
      <ul class="menu-list">
        @for (item of menuItems; track item) {
          <li>
            <button
              type="button"
              class="menu-item"
              [class.is-active]="activeSection() === item"
              [attr.aria-current]="activeSection() === item ? 'page' : null"
              (click)="setActiveSection(item)"
            >
              {{ item }}
            </button>
          </li>
        }
      </ul>
    </nav>

    <main class="content-area">
      @switch (activeSection()) {
        @case ('Clientes') {
          <app-clientes-section />
        }
        @case ('Cuentas') {
          <app-cuentas-section />
        }
        @case ('Movimientos') {
          <app-movimientos-section />
        }
        @case ('Reportes') {
          <app-reportes-section />
        }
      }
    </main>
  </div>
</div>
