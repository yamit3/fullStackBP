<div class="page-layout">
  <header class="top-header">
    <h1 class="brand">BANCO</h1>
  </header>

  <div class="workspace">
    <nav class="side-menu" aria-label="Navegacion principal">
      <ul class="menu-list">
        @for (item of menuItems; track item) {
          <li>
            <button
              type="button"
              class="menu-item"
              [class.is-active]="activeSection() === item"
              [attr.aria-current]="activeSection() === item ? 'page' : null"
              (click)="setActiveSection(item)"
            >
              {{ item }}
            </button>
          </li>
        }
      </ul>
    </nav>

    <main class="content-area" aria-labelledby="page-title">
      <div class="content-header">
        <h2 id="page-title" class="section-title">{{ pageTitle() }}</h2>

        <button type="button" class="new-button" aria-label="Crear nuevo cliente">
          Nuevo
        </button>
      </div>

      <label class="sr-only" for="search-input">Buscar clientes</label>
      <input
        id="search-input"
        type="search"
        class="search-input"
        [formControl]="searchControl"
        placeholder="Buscar"
      />

      <section class="table-panel" aria-label="Listado de clientes">
        <h3 class="sr-only">Resultados</h3>
        @for (row of [1, 2, 3, 4, 5, 6]; track row) {
          <div class="table-row" aria-hidden="true"></div>
        }
      </section>
    </main>
  </div>
</div>
