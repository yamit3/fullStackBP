<section class="section-shell" aria-labelledby="page-title">
  <div class="content-header">
    <h2 id="page-title" class="section-title">{{ title }}</h2>
    <button type="button" class="new-button" [attr.aria-label]="createButtonAriaLabel">
      Nuevo
    </button>
  </div>

  <label class="sr-only" for="search-input">{{ searchLabel }}</label>
  <input
    id="search-input"
    type="search"
    class="search-input"
    [formControl]="searchControl"
    [placeholder]="searchPlaceholder"
  />

  <section class="table-panel" [attr.aria-label]="tableAriaLabel">
    <h3 class="sr-only">Resultados</h3>
    @for (row of rows; track row) {
      <div class="table-row" aria-hidden="true"></div>
    }
  </section>
</section>
